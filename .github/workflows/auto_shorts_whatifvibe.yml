name: Daily YouTube Short — WhatIfVibe

on:
  schedule:
    # Redundant attempts per slot: GitHub frequently drops/delays scheduled
    # events, so each slot is retried a few times. should_run.py dedupes by
    # slot/day, so at most one upload happens per slot.
    # Minutes :42/:02/:22/:42 avoid on-the-hour queue peaks (EDT = UTC-4).
    # morning ~10:00 EDT (14:00 UTC) — retries 09:42–10:42 EDT
    - cron: "42 13 * * *"
    - cron: "2 14 * * *"
    - cron: "22 14 * * *"
    - cron: "42 14 * * *"
    # afternoon ~14:00 EDT (18:00 UTC) — retries 13:42–14:42 EDT
    - cron: "42 17 * * *"
    - cron: "2 18 * * *"
    - cron: "22 18 * * *"
    - cron: "42 18 * * *"
    # evening ~18:00 EDT (22:00 UTC) — retries 17:42–18:42 EDT
    - cron: "42 21 * * *"
    - cron: "2 22 * * *"
    - cron: "22 22 * * *"
    - cron: "42 22 * * *"
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Generate video only (skip YouTube upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_slot:
        description: "Force upload slot for manual tests"
        required: false
        default: "morning"
        type: choice
        options:
          - "morning"
          - "afternoon"
          - "evening"

permissions:
  contents: write

concurrency:
  group: youtube-shorts-gemini-global
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decide if this schedule window should run
        id: gate
        env:
          CHANNEL_PROFILE: whatifvibe
          UPLOAD_TIMEZONE: America/New_York
          FORCE_UPLOAD_SLOT: ${{ github.event.inputs.force_slot || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if python scripts/should_run.py; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache media assets
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            background_music/
            minecraft_gameplay/
          key: media-assets-v1-${{ runner.os }}

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-dejavu-extra

      - name: Verify FFmpeg subtitle support
        if: steps.gate.outputs.should_run == 'true'
        run: |
          ffmpeg -h filter=subtitles 2>&1 | grep -qv "Unknown filter 'subtitles'"

      - name: Install Python dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Generate and upload Short
        if: steps.gate.outputs.should_run == 'true'
        env:
          CHANNEL_PROFILE: whatifvibe
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_WHATIFVIBE: ${{ secrets.YT_REFRESH_TOKEN_WHATIFVIBE }}
          YT_TARGET_CHANNEL_ID_WHATIFVIBE: ${{ secrets.YT_TARGET_CHANNEL_ID_WHATIFVIBE }}
          YT_PRIVACY_STATUS: ${{ secrets.YT_PRIVACY_STATUS }}
          EDGE_TTS_VOICE: ${{ secrets.EDGE_TTS_VOICE_WHATIFVIBE }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          UPLOAD_TIMEZONE: America/New_York
          UPLOAD_SLOT: ${{ env.UPLOAD_SLOT }}
          WORK_DIR: ${{ env.WORK_DIR }}
          SKIP_YOUTUBE_UPLOAD: ${{ github.event.inputs.skip_upload || 'false' }}
        run: python main.py --channel whatifvibe

      - name: Persist upload history
        if: success() && steps.gate.outputs.should_run == 'true' && github.event.inputs.skip_upload != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/whatifvibe/recent_topics.json data/whatifvibe/uploads_log.csv
          if git diff --staged --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore: record WhatIfVibe Short upload for ${UPLOAD_SLOT}"
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Pushed upload history on attempt ${attempt}."
                break
              fi
              echo "Push rejected on attempt ${attempt}; rebasing on latest main."
              git pull --rebase --autostash origin main
              if [ "${attempt}" -eq 5 ]; then
                echo "Failed to push upload history after ${attempt} attempts." >&2
                exit 1
              fi
              sleep $((attempt * 3))
            done
          fi

      - name: Upload build artifacts on failure
        if: failure() && steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-whatifvibe-${{ env.UPLOAD_SLOT || 'unknown' }}
          path: |
            work/
          if-no-files-found: ignore
          retention-days: 3
