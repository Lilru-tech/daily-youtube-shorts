name: Daily YouTube Short

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Generate video only (skip YouTube upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Verify FFmpeg subtitle support
        run: |
          ffmpeg -h filter=subtitles 2>&1 | grep -qv "Unknown filter 'subtitles'"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and upload Short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY_STATUS: ${{ secrets.YT_PRIVACY_STATUS }}
          EDGE_TTS_VOICE: ${{ secrets.EDGE_TTS_VOICE }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          SKIP_YOUTUBE_UPLOAD: ${{ github.event.inputs.skip_upload || 'false' }}
        run: python main.py

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-artifacts
          path: |
            work/
          if-no-files-found: ignore
          retention-days: 3
